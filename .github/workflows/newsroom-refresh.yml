name: OpenClaw Manager Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run OpenClaw manager
        env:
          NEWSROOM_PULL_URL: ${{ secrets.NEWSROOM_PULL_URL }}
          NEWSROOM_PULL_TOKEN: ${{ secrets.NEWSROOM_PULL_TOKEN }}
          OPENCLAW_NEWSROOM_URL: ${{ secrets.OPENCLAW_NEWSROOM_URL }}
          OPENCLAW_NEWSROOM_TOKEN: ${{ secrets.OPENCLAW_NEWSROOM_TOKEN }}
          NEWSROOM_CONTENT_PATH: data/newsroom-content.json
          PLATFORM_STATE_PATH: data/platform-state.json
          OPENCLAW_MANAGER_STATE_PATH: data/openclaw-manager-state.json
        run: node scripts/openclaw-manager.mjs

      - name: Commit refreshed newsroom state
        run: |
          if git diff --quiet -- data/newsroom-content.json data/platform-state.json data/openclaw-manager-state.json data/openclaw-hidden-feed.json; then
            echo "No OpenClaw changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/newsroom-content.json data/platform-state.json data/openclaw-manager-state.json data/openclaw-hidden-feed.json
          git commit -m "Run OpenClaw manager cycle"
          git push
