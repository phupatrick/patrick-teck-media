name: OpenClaw Manager Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run OpenClaw manager
        env:
          NEWSROOM_PULL_URL: ${{ secrets.NEWSROOM_PULL_URL }}
          NEWSROOM_PULL_TOKEN: ${{ secrets.NEWSROOM_PULL_TOKEN }}
          OPENCLAW_NEWSROOM_URL: ${{ secrets.OPENCLAW_NEWSROOM_URL }}
          OPENCLAW_NEWSROOM_TOKEN: ${{ secrets.OPENCLAW_NEWSROOM_TOKEN }}
          NEWSROOM_CONTENT_PATH: data/newsroom-content.json
          OPENCLAW_WEB_STATE_PATH: data/openclaw-web-state.json
          PLATFORM_STATE_PATH: data/platform-state.json
          OPENCLAW_MANAGER_STATE_PATH: data/openclaw-manager-state.json
        run: node scripts/openclaw-manager.mjs

      - name: Verify and publish OpenClaw changes
        env:
          OPENCLAW_GIT_AUTOPUSH: "1"
          OPENCLAW_GIT_USER_NAME: "github-actions[bot]"
          OPENCLAW_GIT_USER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
          OPENCLAW_GIT_COMMIT_MESSAGE: "Run OpenClaw manager cycle"
        run: node scripts/openclaw-git-sync.mjs
